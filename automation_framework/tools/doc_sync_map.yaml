    group: policy
    difficulty: advanced
    index_description: "MMT-framed analysis. SEBE as inflation control instrument, anchor migration from labour to energy, self-balancing fiscal design."
    order: 4

  green_party_submission_appendix_a:
    title: "Appendix A: Metering, Enforcement and Billing"
    description: "Technical feasibility of SEE and DCD metering, enforcement and billing"
    group: policy
    difficulty: advanced
    index_description: "Technical appendix to the policy submission. How SEE and DCD are metered using existing infrastructure, enforced at physical chokepoints, and billed monthly."
    order: 6

  public_explainer:
