# Document sync mapping
#
# Single source of truth for docs/ -> site/docs/ generation.
# Adding a new document: add an entry here, create the file in docs/.
# The build script (doc_sync.py) reads this to generate site/docs/.
#
# Fields:
#   title:             Jekyll page title (used in front matter and index)
#   description:       Jekyll meta description
#   group:             Index group (must match a key in 'groups')
#   difficulty:        accessible | intermediate | advanced
#   index_description: Short text shown on the documents index page
#   order:             Sort order within group (lower = first)
#   doc_date:          Override date (otherwise extracted from source header)
#   extra_front_matter: Additional YAML keys to add to front matter (optional)

groups:
  policy:
    heading: "Policy"
    order: 1
  model:
    heading: "Models & Evidence"
    order: 2
  analysis:
    heading: "Analysis"
    order: 3

documents:
  SEBE_summary:
    title: "Tax Robots, Fund People"
