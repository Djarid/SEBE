# Document sync mapping
#
# Single source of truth for docs/ -> site/docs/ generation.
# Adding a new document: add an entry here, create the file in docs/.
# The build script (doc_sync.py) reads this to generate site/docs/.
#
# Fields:
#   title:             Jekyll page title (used in front matter and index)
#   description:       Jekyll meta description
#   group:             Index group (must match a key in 'groups')
#   difficulty:        accessible | intermediate | advanced
#   index_description: Short text shown on the documents index page
#   order:             Sort order within group (lower = first)
#   doc_date:          Override date (otherwise extracted from source header)
#   extra_front_matter: Additional YAML keys to add to front matter (optional)

groups:
  policy:
    heading: "Policy"
    order: 1
  model:
    heading: "Models & Evidence"
    order: 2
  analysis:
    heading: "Analysis"
    order: 3

documents:
  SEBE_summary:
    title: "Tax Robots, Fund People"
    description: "A new tax on automation infrastructure that starts at £38 billion and grows every year machines replace workers."
    group: policy
    difficulty: accessible
    index_description: "Four-page overview: the problem, the mechanism, the revenue, the ask."
    order: 1

  green_party_submission:
    title: "SEBE: Green Party Policy Submission"
    description: "Policy submission using the Now / Likely Future / Wanted Future framework"
    group: policy
    difficulty: intermediate
    index_description: "Policy submission to PDC and Economy PWG. Three-framing structure: present harms, trajectory, desired outcome. MMT-framed."
    order: 2

  academic_brief:
    title: "Infrastructure-Based Taxation for the Post-Employment Economy"
    description: "SEBE academic analysis for think tanks and researchers"
    group: policy
    difficulty: advanced
    index_description: "Full academic analysis for think tanks and researchers. Technical feasibility, rate derivation, research agenda."
    order: 3

  academic_brief_mmt:
    title: "Inflation Control for the Post-Employment Economy"
