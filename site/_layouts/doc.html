---
layout: default
---
<div class="doc-meta">
  <h1>{{ page.title }}</h1>
  <div class="doc-details">
    {% if page.doc_author %}<span>{{ page.doc_author }}</span>{% endif %}
    {% if page.version %}<span>Version {{ page.version }}</span>{% endif %}
    {% if page.doc_date %}<span>{{ page.doc_date }}</span>{% endif %}
  </div>
</div>

<div class="prose">
  {{ content }}
</div>

<div class="doc-footer">
  &copy; 2026 Jason Huxley. Licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY 4.0</a>.
</div>
